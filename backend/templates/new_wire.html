{% extends "base.html" %} {% block content %}

<h2>Create Multi Wire</h2>

<form method="POST">
  <div class="mb-3">
    <label class="form-label"> Multi Wire Number </label>

    <input
      name="multiwire_no"
      class="form-control"
      placeholder="2026-F3-0000351"
      required
    />
  </div>

  <button class="btn btn-primary">Save</button>

  <a href="/" class="btn btn-secondary"> Cancel </a>
</form>

{% endblock %}
